name: Build Desktop App

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wine (for Windows build on Linux)
        if: runner.os == 'Linux'
        run: |
          sudo dpkg --add-architecture i386
          sudo mkdir -pm755 /etc/apt/keyrings
          sudo wget -O /etc/apt/keyrings/winehq-archive.key https://dl.winehq.org/wine-builds/winehq.key
          sudo wget -NP /etc/apt/sources.list.d/ https://dl.winehq.org/wine-builds/ubuntu/dists/noble/winehq-noble.sources
          sudo apt update
          sudo apt install -y --install-recommends winehq-stable
          wine --version

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @sortfiles/ai-providers build && pnpm --filter @sortfiles/core build

      - name: Clean release directory
        working-directory: packages/desktop-app
        shell: bash
        run: rm -rf release || true

      - name: Build desktop app
        working-directory: packages/desktop-app
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            pnpm run package:win
          elif [ "${{ runner.os }}" = "macOS" ]; then
            pnpm run package:mac
          else
            pnpm run package:linux
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sortfiles-${{ runner.os }}
          path: |
            packages/desktop-app/release/*.deb
            packages/desktop-app/release/*.AppImage
            packages/desktop-app/release/*.exe
            packages/desktop-app/release/*.dmg
            packages/desktop-app/release/*.zip
          retention-days: 30
          if-no-files-found: warn

  test-linux:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: sortfiles-Linux
          path: artifacts

      - name: Install .deb package
        run: |
          sudo dpkg -i artifacts/*.deb || sudo apt-get install -f -y
          sudo update-desktop-database /usr/share/applications || true

      - name: Verify installation
        run: |
          which @sortfilesdesktop-app || echo "Binary not in PATH, checking install location..."
          ls -la /opt/SortFiles/ || echo "Install location not found"
          cat /usr/share/applications/@sortfilesdesktop-app.desktop || echo "Desktop file not found"

      - name: Test AppImage
        run: |
          chmod +x artifacts/*.AppImage
          ./artifacts/*.AppImage --version || echo "AppImage test completed"

  test-windows:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download Windows artifacts
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: sortfiles-Windows
          path: artifacts

      - name: Check if artifacts exist
        if: steps.download.outcome == 'failure'
        run: Write-Host "Windows artifacts not found, skipping test"

      - name: List files
        if: steps.download.outcome == 'success'
        run: Get-ChildItem -Recurse artifacts

      - name: Verify package
        if: steps.download.outcome == 'success'
        run: |
          if (Test-Path "artifacts\SortFiles*.exe") {
            Write-Host "Windows package found: $(Get-ChildItem artifacts\SortFiles*.exe).Name"
            Write-Host "Size: $((Get-Item artifacts\SortFiles*.exe).Length) bytes"
          } else {
            Write-Host "Installer not found"
          }

  test-macos:
    needs: build
    runs-on: macos-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download macOS artifacts
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: sortfiles-macOS
          path: artifacts

      - name: Check if artifacts exist
        if: steps.download.outcome == 'failure'
        run: echo "macOS artifacts not found, skipping test"

      - name: List files
        if: steps.download.outcome == 'success'
        run: ls -la artifacts/

      - name: Install .dmg
        if: steps.download.outcome == 'success'
        run: |
          dmg_file=$(ls artifacts/*.dmg | head -n 1)
          echo "Installing $dmg_file"
          hdiutil attach "$dmg_file"
          # Find and copy the app (handle dynamic volume names)
          find /Volumes -name "SortFiles.app" -maxdepth 2 -exec cp -R {} /Applications/ \;
          # Detach all SortFiles volumes
          hdiutil detach /Volumes/SortFiles* -force || true

      - name: Verify installation
        if: steps.download.outcome == 'success'
        run: |
          ls -la /Applications/SortFiles.app/ || echo "App not found"
          xattr -l /Applications/SortFiles.app/ || echo "Cannot read attributes"

  release:
    needs: [build, test-linux, test-windows, test-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
