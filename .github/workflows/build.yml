name: Build Desktop App

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter @sortfiles/ai-providers build && pnpm --filter @sortfiles/core build

      - name: Clean release directory
        working-directory: packages/desktop-app
        run: rm -rf release

      - name: Build desktop app
        working-directory: packages/desktop-app
        run: |
          if [ "${{ runner.os }}" = "Windows" ]; then
            pnpm run package:win
          elif [ "${{ runner.os }}" = "macOS" ]; then
            pnpm run package:mac
          else
            pnpm run package:linux
          fi
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sortfiles-${{ runner.os }}
          path: |
            packages/desktop-app/release/*.deb
            packages/desktop-app/release/*.AppImage
            packages/desktop-app/release/*.exe
            packages/desktop-app/release/*.dmg
            packages/desktop-app/release/*.zip
          retention-days: 30
          if-no-files-found: warn

  test-linux:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: sortfiles-Linux
          path: artifacts

      - name: Install .deb package
        run: |
          sudo dpkg -i artifacts/*.deb || sudo apt-get install -f -y
          sudo update-desktop-database /usr/share/applications

      - name: Verify installation
        run: |
          which @sortfilesdesktop-app || echo "Binary not in PATH, checking install location..."
          ls -la /opt/SortFiles/
          cat /usr/share/applications/@sortfilesdesktop-app.desktop

      - name: Test AppImage
        run: |
          chmod +x artifacts/*.AppImage
          ./artifacts/*.AppImage --version || echo "AppImage test completed"

  test-windows:
    needs: build
    runs-on: windows-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: sortfiles-Windows
          path: artifacts

      - name: Install Windows package
        run: |
          Start-Process -FilePath "artifacts\SortFiles*.exe" -ArgumentList "/S", "/D=C:\SortFiles" -Wait

      - name: Verify installation
        run: |
          if (Test-Path "C:\SortFiles\SortFiles.exe") {
            Write-Host "SortFiles installed successfully"
            Get-Item "C:\SortFiles\*"
          } else {
            Write-Host "Installation verification failed"
          }

  test-macos:
    needs: build
    runs-on: macos-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: sortfiles-macOS
          path: artifacts

      - name: Install .dmg
        run: |
          hdiutil attach artifacts/*.dmg
          cp -r /Volumes/SortFiles/SortFiles.app /Applications/
          hdiutil detach /Volumes/SortFiles

      - name: Verify installation
        run: |
          ls -la /Applications/SortFiles.app/
          xattr -l /Applications/SortFiles.app/

  release:
    needs: [build, test-linux, test-windows, test-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
